name: Backend CI

on:
  push:
    paths:
      - 'system/**/*.py'
      - 'tests/**'
      - 'requirements.txt'
  pull_request:
    paths:
      - 'system/**/*.py'
      - 'tests/**'
      - 'requirements.txt'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short
        env:
          CI: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check all Python files
        run: python -c "
          import py_compile, pathlib, sys;
          errors = [];
          [errors.append(str(e)) if not (lambda f: (py_compile.compile(str(f), doraise=True), True)[-1])(f) else None for f in pathlib.Path('system').rglob('*.py') if 'node_modules' not in str(f) and 'whatsapp_worker' not in str(f)];
          sys.exit(1) if errors else print(f'All files OK')
          " 2>&1 || python -m py_compile system/infrastructure/database.py system/core/interpretation/llm_client.py system/tools/runtime/tool_runtime.py
