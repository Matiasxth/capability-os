version: "3.8"

services:
  chrome:
    image: browserless/chrome:1-chrome-stable
    container_name: capos-chrome
    # Not exposed to host — only accessible from capability-os via internal network
    expose:
      - "3000"
    environment:
      - MAX_CONCURRENT_SESSIONS=2
      - CONNECTION_TIMEOUT=120000
      - TOKEN=${BROWSER_TOKEN:-capos_browser_secret}
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: capos-redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  capability-os:
    build: .
    container_name: capability-os
    ports:
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:8001:8001"
    security_opt:
      - no-new-privileges:true
    volumes:
      - workspace:/data/workspace
      - artifacts:/data/workspace/artifacts
    environment:
      # LLM
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${LLM_MODEL:-llama3.1:8b}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      # WebSocket
      - WS_PORT=8001
      # Browser (connects to Chrome service)
      - BROWSER_CDP_URL=ws://chrome:3000
      # Redis
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - chrome
      - redis
    restart: unless-stopped

  # ── Optional: separate worker containers for horizontal scaling ──
  # Uncomment these to run workers as separate containers.
  # Without them, workers run in-process within capability-os.

  # channel-workers:
  #   build: .
